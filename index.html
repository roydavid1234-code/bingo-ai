<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>數字 AI 分析儀 - 標題動態優化版</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        html, body { font-size: 16px; } 
        .ball { width: 44px; height: 44px; font-size: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; position: relative; }
        sub { font-size: 0.7rem; position: absolute; bottom: 2px; right: 4px; font-weight: 900; }
        .limit-active { background-color: #4f46e5 !important; border-color: #818cf8 !important; box-shadow: 0 0 10px rgba(129, 140, 248, 0.4); }
        .count-active { background-color: #eab308 !important; border-color: #fde047 !important; color: #0f172a !important; transform: scale(1.05); box-shadow: 0 0 10px rgba(234, 179, 8, 0.4); }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 p-4 font-sans leading-relaxed">
    <div class="max-w-3xl mx-auto space-y-8">
        <header class="bg-slate-800 p-6 rounded-xl border border-slate-700 flex flex-col md:flex-row justify-between items-center gap-4 shadow-lg">
            <div class="flex-1">
                <h1 class="text-2xl font-bold text-yellow-400 flex items-center gap-2">🎰 數字 AI 分析儀</h1>
                 <h3 class="text-sm font-bold text-red-400 flex items-center gap-2 mt-2">以上信息僅供參考，使用前請自行確認其準確性</h3>
                 <h3 class="text-sm font-bold text-red-400 flex items-center gap-2">本內容僅供參考，使用者需自行承擔風險</h3>
 
                <p id="cur-period" class="text-indigo-400 font-mono text-lg mt-4 tracking-tight">連線中...</p>
                <p id="update-time" class="text-emerald-400 font-bold text-base mt-1 italic">等待數據同步...</p>
            </div>
            
            <div class="flex flex-col items-end gap-3">
                <div class="bg-indigo-900/30 text-indigo-300 px-3 py-1 rounded-full border border-indigo-500/30 flex items-center gap-2 text-xs">
                    <span class="relative flex h-2 w-2">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    雲端即時同步中
                </div>
            </div>
        </header>

        <div class="bg-slate-800 p-6 rounded-2xl border-l-8 border-indigo-400 shadow-xl">
            <h3 class="text-xl font-bold text-indigo-300 mb-4 flex items-center gap-2">數據分析範圍 (期數切換)</h3>
            <div class="grid grid-cols-5 gap-2 md:gap-3 text-sm">
                <button onclick="changeLimit(1)" id="btn-limit-1" class="limit-btn bg-slate-700 py-2 rounded-lg font-bold hover:bg-indigo-600 transition-all border border-transparent">近 1 期</button>
                <button onclick="changeLimit(2)" id="btn-limit-2" class="limit-btn bg-slate-700 py-2 rounded-lg font-bold hover:bg-indigo-600 transition-all border border-transparent">近 2 期</button>
                <button onclick="changeLimit(3)" id="btn-limit-3" class="limit-btn bg-slate-700 py-2 rounded-lg font-bold hover:bg-indigo-600 transition-all border border-transparent">近 3 期</button>
                <button onclick="changeLimit(4)" id="btn-limit-4" class="limit-btn bg-slate-700 py-2 rounded-lg font-bold hover:bg-indigo-600 transition-all border border-transparent">近 4 期</button>
                <button onclick="changeLimit(5)" id="btn-limit-5" class="limit-btn bg-slate-700 py-2 rounded-lg font-bold hover:bg-indigo-600 transition-all border border-transparent">近 5 期</button>
                <button onclick="changeLimit(6)" id="btn-limit-6" class="limit-btn bg-slate-700 py-2 rounded-lg font-bold hover:bg-indigo-600 transition-all border border-transparent">近 6 期</button>
                <button onclick="changeLimit(7)" id="btn-limit-7" class="limit-btn bg-slate-700 py-2 rounded-lg font-bold hover:bg-indigo-600 transition-all border border-transparent">近 7 期</button>
                <button onclick="changeLimit(8)" id="btn-limit-8" class="limit-btn bg-slate-700 py-2 rounded-lg font-bold hover:bg-indigo-600 transition-all border border-transparent">近 8 期</button>
                <button onclick="changeLimit(9)" id="btn-limit-9" class="limit-btn bg-slate-700 py-2 rounded-lg font-bold hover:bg-indigo-600 transition-all border border-transparent">近 9 期</button>
                <button onclick="changeLimit(10)" id="btn-limit-10" class="limit-btn limit-active py-2 rounded-lg font-bold border">近 10 期</button>
            </div>
        </div>

        <div class="bg-slate-800 p-6 rounded-2xl border-l-8 border-rose-500 shadow-xl">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <h3 id="top-title" class="text-xl font-bold text-rose-400 mb-4 flex items-center gap-2">📈 近10期-出現機率排行榜 (Top 10)</h3>
                    <div id="prob-rank" class="space-y-2 text-lg">尚未載入數據</div>
                </div>
                <div>
                    <h3 id="low-title" class="text-xl font-bold text-blue-400 mb-4 flex items-center gap-2">📉 近10期-冷門號碼排行榜 (Low 10)</h3>
                    <div id="prob-low-rank" class="space-y-2 text-lg">尚未載入數據</div>
                </div>
            </div>
        </div>

        <div class="bg-slate-800 p-8 rounded-2xl border-t-8 border-yellow-500 shadow-2xl">
            <h2 class="text-xl font-bold text-yellow-500 mb-2 text-center tracking-widest">🔮 AI 核心預測</h2>
            <p class="text-center text-slate-400 text-xs mb-6">小數點 是該x期內出現的次數 🔮科學的盡頭是玄學</p>
            
            <div class="flex flex-wrap justify-center gap-2 mb-8">
                <button onclick="changeBallCount(1)" id="btn-count-1" class="count-btn bg-slate-700 px-4 py-2 rounded-lg font-bold hover:bg-yellow-500 transition-all border border-transparent">1球</button>
                <button onclick="changeBallCount(2)" id="btn-count-2" class="count-btn bg-slate-700 px-4 py-2 rounded-lg font-bold hover:bg-yellow-500 transition-all border border-transparent">2球</button>
                <button onclick="changeBallCount(3)" id="btn-count-3" class="count-btn bg-slate-700 px-4 py-2 rounded-lg font-bold hover:bg-yellow-500 transition-all border border-transparent">3球</button>
                <button onclick="changeBallCount(4)" id="btn-count-4" class="count-btn bg-slate-700 px-4 py-2 rounded-lg font-bold hover:bg-yellow-500 transition-all border border-transparent">4球</button>
                <button onclick="changeBallCount(5)" id="btn-count-5" class="count-btn bg-slate-700 px-4 py-2 rounded-lg font-bold hover:bg-yellow-500 transition-all border border-transparent">5球</button>
                <button onclick="changeBallCount(6)" id="btn-count-6" class="count-btn count-active px-4 py-2 rounded-lg font-bold border border-transparent">6球</button>
            </div>

            <div id="pred-box" class="flex flex-wrap justify-center gap-4 mb-8"></div>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <button onclick="setStrat('hot')" id="btn-hot" class="strat-btn bg-orange-600 p-3 rounded-xl font-bold text-base ring-4 ring-white/50">🔥 追熱門</button>
                <button onclick="setStrat('balanced')" id="btn-balanced" class="strat-btn bg-emerald-600 p-3 rounded-xl font-bold text-base">⚖️ 均衡</button>
                <button onclick="setStrat('luck')" id="btn-luck" class="strat-btn bg-purple-600 p-3 rounded-xl font-bold text-base">🎲 拼運氣</button>
                <button onclick="setStrat('random')" id="btn-random" class="strat-btn bg-blue-600 p-3 rounded-xl font-bold text-base">🌀 AI隨便挑</button>
            </div>
        </div>

        <div class="bg-slate-800 p-6 rounded-xl border-l-8 border-yellow-500 shadow-lg">
            <h3 class="text-xl font-bold text-yellow-500 mb-4">💡 脆友的攻略推薦</h3>
            <div id="strat-logic" class="space-y-4 text-lg"></div>
        </div>

        <div class="bg-slate-800 p-6 rounded-xl border-l-8 border-indigo-500 shadow-lg">
            <h3 class="text-xl font-bold text-indigo-400 mb-4">⭐ 星級配號</h3>
            <div id="star-list" class="grid grid-cols-1 md:grid-cols-2 gap-4 text-lg"></div>
        </div>

        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
            <h3 class="text-xl font-bold text-emerald-400 mb-6">🔍 號碼屬性分析</h3>
            <div id="n-groups" class="space-y-6 text-lg"></div>
        </div>

        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
            <h3 class="text-xl font-bold text-slate-400 mb-4">📅 近期歷史數據</h3>
            <div id="history-container" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB-udYSuPiA2CVOaFHW45O0i2DN_loc7lo",
            authDomain: "bingo-ai-360ad.firebaseapp.com",
            databaseURL: "https://bingo-ai-360ad-default-rtdb.firebaseio.com",
            projectId: "bingo-ai-360ad",
            storageBucket: "bingo-ai-360ad.firebasestorage.app",
            messagingSenderId: "613330768290",
            appId: "1:613330768290:web:a17d981e96fbc7726622fb",
            measurementId: "G-2Y2KQYMYGX"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let fullHistory = [];
        let currentLimit = 10;
        let strat = 'hot';
        let currentBallCount = 6;

        function initRealtimeSync() {
            const dataRef = database.ref('bingo_data');
            dataRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    fullHistory = data.records || [];
                    document.getElementById('cur-period').innerText = `最新期數：${fullHistory[0].period}`;
                    document.getElementById('update-time').innerText = "最後更新時間：" + (data.last_update || "未知");
                    renderAll();
                }
            });
        }

        function renderAll() {
            if (!fullHistory.length) return;
            const history = fullHistory.slice(0, currentLimit);
            const numsOnly = history.map(h => h.numbers);
            let counts = {};
            numsOnly.flat().forEach(n => counts[n] = (counts[n] || 0) + 1);
            const groups = calculateNGroups(history, counts);
            renderPrediction(counts, groups);
            renderStrategies();
            renderStars(groups);
            renderNGroups(groups);
            renderHistoryList(history);
            renderProbabilityRank(history);
        }

        function calculateNGroups(history, counts) {
            const all = Array.from({length: 80}, (_, i) => (i+1).toString().padStart(2, '0'));
            const last = history[0].numbers;
            const last2 = history[0].numbers.concat(history[1] ? history[1].numbers : []);
            const counts5 = {};
            history.slice(0, 5).map(h => h.numbers).flat().forEach(n => counts5[n] = (counts5[n]||0)+1);
            const n1 = all.filter(n => counts[n] >= 2 && counts[n] <= 3);
            const n2 = all.filter(n => counts[n] === 2 && !last.includes(n));
            const n3 = Array.from(new Set(last.slice(0, 5).flatMap(n => [((parseInt(n)+1)%80||80).toString().padStart(2, '0')])));
            const n5 = all.sort((a, b) => fullHistory.findIndex(h => h.numbers.includes(a)) - fullHistory.findIndex(h => h.numbers.includes(b))).reverse().slice(0, 15);
            const n6 = all.filter(n => parseInt(n) <= 10 && !last2.includes(n));
            const n7 = all.filter(n => counts5[n] >= 2);
            const rnd = (arr) => arr.sort(() => 0.5 - Math.random()).slice(0, 10);
            return {
                n1: rnd(n1).map(n => ({num: n, count: counts[n]||0})),
                n2: rnd(n2).map(n => ({num: n, count: counts[n]||0})),
                n3: rnd(n3).map(n => ({num: n, count: counts[n]||0})),
                n4: rnd(all.filter(n => counts[n] >= 2)).map(n => ({num: n, count: counts[n]||0})),
                n5: rnd(n5).map(n => ({num: n, count: counts[n]||0})),
                n6: rnd(n6).map(n => ({num: n, count: counts[n]||0})),
                n7: rnd(n7).map(n => ({num: n, count: counts[n]||0}))
            };
        }

        function renderPrediction(counts, groups) {
            let used = [];
            const pick = (g, c) => {
                if (!g) return [];
                const res = g.map(i => i.num).filter(n => !used.includes(n)).sort(() => 0.5 - Math.random()).slice(0, c);
                used.push(...res);
                return res.map(n => ({num: n, count: counts[n] || 0}));
            };
            const high = Object.keys(counts).filter(n => counts[n] >= 3).map(n => ({num: n}));
            
            let res = [];
            if (strat === 'random') {
                const allNumbers = Array.from({length: 80}, (_, i) => (i+1).toString().padStart(2, '0')).map(n => ({num: n}));
                res = pick(allNumbers, currentBallCount);
            } else if (strat === 'hot') {
                res.push(...pick(high, 2));
                res.push(...pick(groups.n3, 2));
                res.push(...pick(groups.n4, 1));
                res.push(...pick(groups.n7, 1));
            } else if (strat === 'balanced') {
                res.push(...pick(high, 1));
                res.push(...pick(groups.n3, 1));
                res.push(...pick(groups.n2, 2));
                res.push(...pick(groups.n6, 2));
            } else if (strat === 'luck') {
                res.push(...pick(high, 1));
                res.push(...pick(groups.n6, 2));
                res.push(...pick(groups.n5, 1));
                res.push(...pick(groups.n7, 2));
            }
            const finalPicks = res.slice(0, currentBallCount);
            document.getElementById('pred-box').innerHTML = finalPicks.map(i => `<div class="ball bg-gradient-to-tr from-yellow-400 to-yellow-600 text-slate-900 shadow-xl">${i.num}<sub>.${i.count}</sub></div>`).join('');
        }

        function changeBallCount(c) {
            currentBallCount = c;
            updateBallCountUI(c);
            renderAll();
        }

        function updateBallCountUI(c) {
            document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('count-active', 'ring-2', 'ring-white/50'));
            document.getElementById('btn-count-' + c).classList.add('count-active', 'ring-2', 'ring-white/50');
        }

        function renderStrategies() {
            if (fullHistory.length < 5) return;
            const latestPeriodNums = fullHistory[0].numbers; 
            let trailFreq = {};
            for (let i = 1; i < fullHistory.length; i++) {
                const pastCurrent = fullHistory[i].numbers;
                const pastNext = fullHistory[i-1].numbers;
                const matches = latestPeriodNums.filter(n => pastCurrent.includes(n));
                if (matches.length > 0) {
                    pastNext.forEach(n => { trailFreq[n] = (trailFreq[n] || 0) + 1; });
                }
            }
            const xijPicks = Object.entries(trailFreq).sort((a, b) => b[1] - a[1]).slice(0, 6).map(item => item[0]).sort();
            const last5History = fullHistory.slice(0, 5);
            let chengFreq = {};
            last5History.forEach(h => h.numbers.forEach(n => { chengFreq[n] = (chengFreq[n] || 0) + 1; }));
            const chengPicks = latestPeriodNums.map(n => ({ num: n, count: chengFreq[n] || 0 })).sort((a, b) => b.count - a.count).slice(0, 6).map(x => x.num).sort();
            const allNums = Array.from({length: 80}, (_, i) => (i+1).toString().padStart(2, '0'));
            const zhongPicks = allNums.sort(() => 0.5 - Math.random()).slice(0, 6).sort();
            document.getElementById('strat-logic').innerHTML = `
                <div class="pb-2 border-b border-slate-700 font-bold"><span class="text-slate-400">脆友xij的選球邏輯:</span><span class="text-yellow-500 ml-2">${xijPicks.join(' ')}</span></div>
                <div class="py-2 border-b border-slate-700 font-bold"><span class="text-slate-400">承的選球邏輯:</span><span class="text-emerald-400 ml-2">${chengPicks.join(' ')}</span></div>
                <div class="pt-2 font-bold"><span class="text-slate-400">中的選球邏輯:</span><span class="text-blue-400 ml-2">${zhongPicks.join(' ')}</span></div>`;
        }

        function renderStars(groups) {
            const pick = (k, c) => groups[k].map(i => i.num).sort(() => 0.5 - Math.random()).slice(0, c);
            const stars = { "2星": pick('n1', 2), "3星": pick('n1', 3), "4星": pick('n1', 4), "5星": pick('n1', 5) };
            document.getElementById('star-list').innerHTML = Object.entries(stars).map(([k, v]) => `<div class="bg-slate-900/50 p-3 rounded border border-slate-700 shadow-inner"><span class="text-indigo-300 font-bold">${k}:</span> ${v.join(', ')}</div>`).join('');
        }

        function renderNGroups(groups) {
            const nDefs = {
                n1: "<b>N1 溫熱：</b>近 10 期高機率號碼。",
                n2: "<b>N2 回歸：</b>近 10 期出現 2 次且近期未開。",
                n3: "<b>N3 拖號：</b>根據上期推薦的拖牌。",
                n4: "<b>N4 共伴：</b>高共伴率組合。",
                n5: "<b>N5 破冰：</b>連續最久未開號碼。",
                n6: "<b>N6 未開小號：</b>近 2 期未開之 1~10。",
                n7: "<b>N7 5熱：</b>近 5 期內強勢號碼。"
            };
            document.getElementById('n-groups').innerHTML = Object.entries(nDefs).map(([k, def]) => `<div class="border-b border-slate-700 pb-4"><p class="text-emerald-300 mb-2">${def}</p><div class="flex flex-wrap gap-x-4">${groups[k].map(i => `<span class="text-slate-300 font-bold text-xl">${i.num}<sub>.${i.count}</sub></span>`).join('')}</div></div>`).join('');
        }

        function renderHistoryList(history) {
            document.getElementById('history-container').innerHTML = history.map(h => `<div class="flex flex-col md:flex-row bg-slate-900/40 p-3 rounded-lg border border-slate-700/50"><span class="text-indigo-400 font-mono font-bold md:w-32">${h.period}</span><span class="text-slate-300 flex-1 tracking-widest text-lg">${h.numbers.join(' ')}</span></div>`).join('');
        }

        function renderProbabilityRank(history) {
            let counts = {};
            for (let i = 1; i <= 80; i++) {
                counts[i.toString().padStart(2, '0')] = 0;
            }
            history.map(h => h.numbers).flat().forEach(n => counts[n]++);
            
            const entries = Object.entries(counts);
            
            const top10 = [...entries].sort((a, b) => b[1] - a[1]).slice(0, 10);
            document.getElementById('prob-rank').innerHTML = top10.map(([num, count], index) => 
                `<div class="flex justify-between border-b border-slate-700 py-2"><span><span class="text-slate-500 mr-2">${index + 1}.</span> 球號 <b class="text-rose-400">${num}</b></span><span>出現 <b>${count}</b> 次</span></div>`
            ).join('');

            const low10 = [...entries].sort((a, b) => a[1] - b[1]).slice(0, 10);
            document.getElementById('prob-low-rank').innerHTML = low10.map(([num, count], index) => 
                `<div class="flex justify-between border-b border-slate-700 py-2"><span><span class="text-slate-500 mr-2">${index + 1}.</span> 球號 <b class="text-blue-400">${num}</b></span><span>出現 <b>${count}</b> 次</span></div>`
            ).join('');
        }

        // 核心優化：優化 changeLimit 函式以同步更新標題
        function changeLimit(l) { 
            currentLimit = l; 
            updateLimitUI(l); 
            
            // 動態更新標題文字
            document.getElementById('top-title').innerHTML = `📈 近${l}期-出現機率排行榜 (Top 10)`;
            document.getElementById('low-title').innerHTML = `📉 近${l}期-冷門號碼排行榜 (Low 10)`;
            
            renderAll(); 
        }

        function updateLimitUI(l) { 
            document.querySelectorAll('.limit-btn').forEach(b => b.classList.remove('limit-active')); 
            document.getElementById(`btn-limit-${l}`).classList.add('limit-active'); 
        }

        function setStrat(s) { 
            strat = s; 
            document.querySelectorAll('.strat-btn').forEach(b => b.classList.remove('ring-4', 'ring-white/50')); 
            document.getElementById('btn-' + s).classList.add('ring-4', 'ring-white/50'); 
            renderAll(); 
        }
        
        window.onload = initRealtimeSync;
    </script>
</body>
</html>
