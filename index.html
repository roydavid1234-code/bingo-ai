<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>數字 AI 分析儀 - Firebase 即時版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        /* 強制全站基礎字體至少 16px */
        html, body { font-size: 16px; } 
        .ball { width: 44px; height: 44px; font-size: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; position: relative; }
        sub { font-size: 0.7rem; position: absolute; bottom: 2px; right: 4px; font-weight: 900; }
        .limit-active { background-color: #4f46e5 !important; border-color: #818cf8 !important; box-shadow: 0 0 10px rgba(129, 140, 248, 0.4); }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 p-4 font-sans leading-relaxed">
    <div class="max-w-3xl mx-auto space-y-8">
        
        <header class="bg-slate-800 p-6 rounded-xl border border-slate-700 flex justify-between items-center shadow-lg">
            <div>
                <h1 class="text-2xl font-bold text-yellow-500">🎰 數字 AI 分析儀</h1>
                <p id="cur-period" class="text-indigo-400 font-mono text-lg mt-1 tracking-tight">正在連線 Firebase...</p>
                <p id="update-time" class="text-emerald-400 font-bold text-base mt-1 italic">最後更新：讀取中...</p>
            </div>
            <div class="bg-indigo-900/50 text-indigo-300 px-4 py-2 rounded-lg border border-indigo-500/50 flex items-center gap-2">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                <span class="font-bold text-lg">雲端即時同步中</span>
            </div>
        </header>

        <div class="bg-slate-800 p-6 rounded-2xl border-l-8 border-indigo-400 shadow-xl">
            <h3 class="text-xl font-bold text-indigo-300 mb-4 flex items-center gap-2">數據分析範圍 (期數切換)</h3>
            <div class="flex flex-wrap items-center gap-4 text-lg">
                <button onclick="changeLimit(5)" id="btn-limit-5" class="limit-btn bg-slate-700 px-6 py-2 rounded-lg font-bold hover:bg-indigo-600 transition-all border border-transparent">近 5 期</button>
                <button onclick="changeLimit(10)" id="btn-limit-10" class="limit-btn limit-active px-6 py-2 rounded-lg font-bold border">近 10 期</button>
                <div class="flex items-center bg-slate-700 rounded-lg px-3 py-1 border border-slate-600 ml-auto">
                    <span class="mr-2 text-slate-400 text-sm">自定義:</span>
                    <input type="number" id="custom-limit" min="1" max="50" placeholder="期數" class="bg-transparent border-none text-white w-16 text-center focus:ring-0 text-lg outline-none">
                    <button onclick="applyCustomLimit()" class="ml-2 bg-indigo-500 hover:bg-indigo-400 px-3 py-1 rounded text-sm font-bold">套用</button>
                </div>
            </div>
        </div>

        <div class="bg-slate-800 p-6 rounded-2xl border-l-8 border-rose-500 shadow-xl">
            <h3 id="prob-title" class="text-xl font-bold text-rose-400 mb-4">📈 出現機率排行榜 (Top 10)</h3>
            <div id="prob-rank" class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-2 text-lg"></div>
        </div>

        <div class="bg-slate-800 p-8 rounded-2xl border-t-8 border-yellow-500 shadow-2xl">
            <h2 class="text-xl font-bold text-yellow-500 mb-6 text-center tracking-widest">🔮 AI 核心預測 (6球模式)</h2>
            <div id="pred-box" class="flex justify-around mb-8"></div>
            <div class="grid grid-cols-3 gap-4">
                <button onclick="setStrat('hot')" id="btn-hot" class="strat-btn bg-orange-600 p-4 rounded-xl font-bold text-lg ring-4 ring-white/50">🔥 追熱門</button>
                <button onclick="setStrat('balanced')" id="btn-balanced" class="strat-btn bg-emerald-600 p-4 rounded-xl font-bold text-lg">⚖️ 均衡</button>
                <button onclick="setStrat('luck')" id="btn-luck" class="strat-btn bg-purple-600 p-4 rounded-xl font-bold text-lg">🎲 拼運氣</button>
            </div>
        </div>

        <div class="bg-slate-800 p-6 rounded-xl border-l-8 border-yellow-500 shadow-lg">
            <h3 class="text-xl font-bold text-yellow-500 mb-4">💡 攻略邏輯推薦 (核心公式)</h3>
            <div id="strat-logic" class="space-y-4 text-lg"></div>
        </div>

        <div class="bg-slate-800 p-6 rounded-xl border-l-8 border-indigo-500 shadow-lg">
            <h3 class="text-xl font-bold text-indigo-400 mb-4">⭐ 星級配號 (2星-10星)</h3>
            <div id="star-list" class="grid grid-cols-1 md:grid-cols-2 gap-4 text-lg"></div>
        </div>

        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
            <h3 class="text-xl font-bold text-emerald-400 mb-6">🔍 號碼屬性分析 (N1-N7 定義)</h3>
            <p class="text-indigo-300 mt-2 text-sm italic">※ 若欄位超過 10 個數字，系統將隨機顯示其中 10 個。</p>
            <div id="n-groups" class="space-y-6 text-lg"></div>
        </div>

        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
            <h3 class="text-xl font-bold text-slate-400 mb-4">📅 近期歷史數據 (雲端同步)</h3>
            <div id="history-container" class="space-y-3"></div>
        </div>
    </div>

    <script>
        // 1. Firebase 配置資訊 (已根據您提供的資料填寫)
        const firebaseConfig = {
            apiKey: "AIzaSyB-udYSuPiA2CVOaFHW45O0i2DN_loc7lo",
            authDomain: "bingo-ai-360ad.firebaseapp.com",
            databaseURL: "https://bingo-ai-360ad-default-rtdb.firebaseio.com",
            projectId: "bingo-ai-360ad",
            storageBucket: "bingo-ai-360ad.firebasestorage.app",
            messagingSenderId: "613330768290",
            appId: "1:613330768290:web:a17d981e96fbc7726622fb",
            measurementId: "G-2Y2KQYMYGX"
        };
        
        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let fullHistory = [];
        let currentLimit = 10;
        let strat = 'hot';

        const nDefs = {
            n1: "<b>N1 溫熱：</b>近 10 期高機率（出現 2~3 次）號碼。",
            n2: "<b>N2 回歸：</b>近 10 期出現 2 次且近期未開號碼。",
            n3: "<b>N3 拖號：</b>根據上期推薦的拖牌號碼。",
            n4: "<b>N4 共伴：</b>具備高共伴率組合。",
            n5: "<b>N5 破冰：</b>連續最久未開出的號碼。",
            n6: "<b>N6 未開小號：</b>近 2 期未開之 1~10 號碼。",
            n7: "<b>N7 5熱：</b>近 5 期內強勢號碼。"
        };

        // 2. 實時數據監聽：數據一變動，畫面立刻重新渲染
        function initRealtimeSync() {
            const dataRef = database.ref('bingo_data');
            dataRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    fullHistory = data.records || [];
                    document.getElementById('update-time').innerText = "最後更新時間：" + (data.last_update || "未知");
                    renderAll();
                    console.log("⚡ 雲端數據已即時同步更新");
                }
            }, (error) => {
                console.error("Firebase 連線失敗:", error);
                document.getElementById('cur-period').innerText = "連線失敗，請檢查 Firebase 規則。";
            });
        }

        // 渲染畫面邏輯
        function renderAll() {
            if (!fullHistory || !fullHistory.length) return;
            const history = fullHistory.slice(0, currentLimit);
            const numsOnly = history.map(h => h.numbers);
            let counts = {};
            numsOnly.flat().forEach(n => counts[n] = (counts[n] || 0) + 1);
            
            const groups = calculateNGroups(history, counts);
            
            document.getElementById('cur-period').innerText = `最新期數：${fullHistory[0].period} (範圍: ${history.length} 期)`;
            document.getElementById('prob-title').innerText = `📈 近 ${history.length} 期 出現機率排行榜 (Top 10)`;

            renderPrediction(counts, groups);
            renderStrategies(history, groups);
            renderStars(groups);
            renderNGroups(groups);
            renderHistoryList(history);
            renderProbabilityRank(history);
        }

        // 屬性分析運算 (N1-N7)
        function calculateNGroups(history, counts) {
            const all = Array.from({length: 80}, (_, i) => (i+1).toString().padStart(2, '0'));
            const last = history[0].numbers;
            const last2 = history[0].numbers.concat(history[1] ? history[1].numbers : []);
            const counts5 = {};
            history.slice(0, 5).map(h => h.numbers).flat().forEach(n => counts5[n] = (counts5[n]||0)+1);

            const n1 = all.filter(n => counts[n] >= 2 && counts[n] <= 3);
            const n2 = all.filter(n => counts[n] === 2 && !last.includes(n));
            const n3 = Array.from(new Set(last.slice(0, 5).flatMap(n => {
                let v = parseInt(n);
                return [((v+1)%80||80).toString().padStart(2, '0'), ((v+10)%80||80).toString().padStart(2, '0')];
            })));
            const n5 = all.sort((a, b) => {
                const idxA = fullHistory.findIndex(h => h.numbers.includes(a));
                const idxB = fullHistory.findIndex(h => h.numbers.includes(b));
                return (idxA === -1 ? 99 : idxA) - (idxB === -1 ? 99 : idxB);
            }).reverse().slice(0, 15);
            const n6 = all.filter(n => parseInt(n) <= 10 && !last2.includes(n));
            const n7 = all.filter(n => counts5[n] >= 2);

            const rnd = (arr) => arr.sort(() => 0.5 - Math.random()).slice(0, 10);
            return {
                n1: rnd(n1).map(n => ({num: n, count: counts[n]||0})),
                n2: rnd(n2).map(n => ({num: n, count: counts[n]||0})),
                n3: rnd(n3).map(n => ({num: n, count: counts[n]||0})),
                n4: rnd(all.filter(n => counts[n] >= 2)).map(n => ({num: n, count: counts[n]||0})),
                n5: rnd(n5).map(n => ({num: n, count: counts[n]||0})),
                n6: rnd(n6).map(n => ({num: n, count: counts[n]||0})),
                n7: rnd(n7).map(n => ({num: n, count: counts[n]||0}))
            };
        }

        // 核心 6 球預測
        function renderPrediction(counts, groups) {
            let used = [];
            const pick = (g, c) => {
                const pool = g.map(i => i.num || i).filter(n => !used.includes(n));
                const res = pool.sort(() => 0.5 - Math.random()).slice(0, c);
                used.push(...res);
                return res.map(n => ({num: n, count: counts[n] || 0}));
            };
            const high = Object.keys(counts).filter(n => counts[n] >= 3);
            let res = [];
            if (strat === 'hot') res = [...pick(high, 2), ...pick(groups.n3, 2), ...pick(groups.n4, 1), ...pick(groups.n7, 1)];
            else if (strat === 'balanced') res = [...pick(high, 1), ...pick(groups.n3, 1), ...pick(groups.n4, 1), ...pick(groups.n2, 2), ...pick(groups.n6, 1)];
            else res = [...pick(high, 1), ...pick(groups.n6, 2), ...pick(groups.n4, 1), ...pick(groups.n5, 1), ...pick(groups.n7, 1)];

            document.getElementById('pred-box').innerHTML = res.map(i => `
                <div class="ball bg-gradient-to-tr from-yellow-400 to-yellow-600 text-slate-900 shadow-xl">
                    ${i.num}<sub>.${i.count}</sub>
                </div>`).join('');
        }

        // 星級推薦
        function renderStars(groups) {
            const pickNum = (k, c) => groups[k].map(i => i.num).sort(() => 0.5 - Math.random()).slice(0, c);
            const stars = {
                "2星": pickNum('n1', 2),
                "3星": pickNum('n1', 2).concat(pickNum('n5', 1)),
                "4星": pickNum('n1', 2).concat(pickNum('n3', 1), pickNum('n5', 1)),
                "5星": pickNum('n1', 2).concat(pickNum('n3', 2), pickNum('n5', 1)),
                "6星": pickNum('n1', 3).concat(pickNum('n3', 2), pickNum('n5', 1))
            };
            document.getElementById('star-list').innerHTML = Object.entries(stars).map(([k, v]) => `
                <div class="bg-slate-900/50 p-3 rounded border border-slate-700 shadow-inner">
                    <span class="text-indigo-300 font-bold">${k}:</span> ${v.join(', ')}
                </div>`).join('');
        }

        // 攻略推薦 (G1-G4)
        function renderStrategies(history, groups) {
            const last = history[0].numbers;
            const tails = new Set();
            const sL = last.map(Number).sort((a,b)=>a-b);
            for(let i=0; i<sL.length-1; i++) if(sL[i+1] === sL[i]+1) tails.add(sL[i]%10);
            const gMap = {
                g1: groups.n7.slice(0, 6).map(i => i.num),
                g2: Array.from({length:80},(_,i)=>(i+1).toString().padStart(2,'0')).filter(n=>tails.has(parseInt(n)%10)).slice(0,8),
                g3: last.filter(n => ["01","10","02","20","03","30","04","40"].includes(n)).map(n => (n==="01"?"10":n==="10"?"01":"--")),
                g4: [groups.n7[0]?.num || "01", ...groups.n2.slice(0,5).map(i=>i.num)]
            };
            const labels = {g1:"攻略(1) 同出熱門", g2:"攻略(2) 連號尾數", g3:"攻略(3) 相反牌", g4:"攻略(4) 主隻搭配"};
            document.getElementById('strat-logic').innerHTML = Object.entries(gMap).map(([k,v]) => 
                `<div class="pb-2 border-b border-slate-700 font-bold"><span class="text-slate-400">${labels[k]}:</span> <span class="text-yellow-500 ml-2">${v.join(' ')}</span></div>`).join('');
        }

        // N1-N7 號碼顯示
        function renderNGroups(groups) {
            document.getElementById('n-groups').innerHTML = Object.entries(nDefs).map(([k, def]) => `
                <div class="border-b border-slate-700 pb-4">
                    <p class="text-emerald-300 mb-2">${def}</p>
                    <div class="flex flex-wrap gap-x-4">
                        ${groups[k].map(i => `<span class="text-slate-300 font-bold text-xl">${i.num}<sub>.${i.count}</sub></span>`).join('')}
                    </div>
                </div>`).join('');
        }

        // 歷史清單
        function renderHistoryList(history) {
            document.getElementById('history-container').innerHTML = history.map(h => `
                <div class="flex flex-col md:flex-row bg-slate-900/40 p-3 rounded-lg border border-slate-700/50 hover:bg-slate-800 transition-colors">
                    <span class="text-indigo-400 font-mono font-bold md:w-32">${h.period}</span>
                    <span class="text-slate-300 flex-1 tracking-widest text-lg">${h.numbers.join(' ')}</span>
                </div>`).join('');
        }

        // 出現機率排行榜
        function renderProbabilityRank(history) {
            let counts = {};
            history.map(h => h.numbers).flat().forEach(n => counts[n] = (counts[n] || 0) + 1);
            const sorted = Object.entries(counts).map(([num, count]) => ({ num, count, prob: (count / history.length * 100).toFixed(0) + '%' }))
                .sort((a, b) => b.count - a.count).slice(0, 10);
            document.getElementById('prob-rank').innerHTML = sorted.map((item, index) => `
                <div class="flex justify-between border-b border-slate-700 py-2">
                    <span><span class="text-slate-500 mr-2">${index + 1}.</span> 球號 <b class="text-rose-400">${item.num}</b></span>
                    <span>出現 <b>${item.count}</b> 次 | <span class="text-rose-300 font-bold">${item.prob}</span></span>
                </div>`).join('');
        }

        // 工具函式
        function changeLimit(l) { currentLimit = l; updateLimitUI(l); renderAll(); }
        function applyCustomLimit() { const v = document.getElementById('custom-limit').value; if (v > 0) { currentLimit = parseInt(v); updateLimitUI(null); renderAll(); } }
        function updateLimitUI(l) { document.querySelectorAll('.limit-btn').forEach(b => b.classList.remove('limit-active')); if(l) document.getElementById(`btn-limit-${l}`).classList.add('limit-active'); }
        function setStrat(s) { strat = s; document.querySelectorAll('.strat-btn').forEach(b => b.classList.remove('ring-4', 'ring-white/50')); document.getElementById('btn-' + s).classList.add('ring-4', 'ring-white/50'); renderAll(); }
        
        // 啟動即時監聽
        window.onload = initRealtimeSync;
    </script>
</body>
</html>
